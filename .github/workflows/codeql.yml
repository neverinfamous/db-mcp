name: CodeQL

on:
  pull_request:
    branches: [main]
  workflow_call:
  schedule:
    - cron: '23 2 * * 1'
  workflow_dispatch:

permissions: {}

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript', 'actions']

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          upload: always
          output: codeql-results

      - name: Fail on high/critical CodeQL findings
        # C-19: Enforce on ALL matrix legs (JS/TS + Actions), not just JS/TS
        run: |
          echo "Checking CodeQL SARIF results for high/critical findings..."
          SARIF_FILE=$(find codeql-results -name '*.sarif' -type f | head -1)
          if [ -z "$SARIF_FILE" ]; then
            echo "No SARIF file found — skipping check"
            exit 0
          fi
          # Count results with error-level severity (high/critical)
          HIGH_COUNT=$(jq '[.runs[].results[] | select(.level == "error")] | length' "$SARIF_FILE" 2>/dev/null || echo "0")
          echo "High/critical findings: $HIGH_COUNT"
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "::error::CodeQL found $HIGH_COUNT high/critical finding(s). Review Security tab for details."
            jq '.runs[].results[] | select(.level == "error") | {ruleId, message: .message.text}' "$SARIF_FILE"
            exit 1
          fi
          echo "✅ No high/critical CodeQL findings"
