name: E2E Tests

on:
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild better-sqlite3 (explicitly allowed)
        run: pnpm rebuild better-sqlite3 --ignore-scripts=false

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build
        run: pnpm run build

      - name: Seed test database
        run: sqlite3 test-server/test.db < test-server/test-database.sql

      - name: Run E2E tests
        run: pnpm run test:e2e

      - uses: actions/upload-artifact@c7d193f32edcb7bfad88892161225aeda64e9392 # v4.0.0
        if: ${{ failure() }}
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          if-no-files-found: warn
          retention-days: 1
