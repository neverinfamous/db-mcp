name: Lint and Test

on:
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: lint-and-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Cache npm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v4.0.0
        with:
          path: ~/.npm
          key: npm-${{ matrix.node-version }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ matrix.node-version }}-

      - name: Verify lockfile integrity
        run: |
          echo "Lockfile SHA-256: $(sha256sum package-lock.json | cut -d' ' -f1)"
          git diff --exit-code package-lock.json || {
            echo "::error::package-lock.json has been modified outside of git"
            exit 1
          }

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 (explicitly allowed)
        run: npm rebuild better-sqlite3 --ignore-scripts=false

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test

  security-scan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (all dependencies)
        timeout-minutes: 10
        run: npm audit --audit-level=moderate

      - name: Run npm audit (production only)
        timeout-minutes: 10
        run: npm audit --omit=dev --audit-level=moderate

  # Smoke test: verify the Docker image builds and starts successfully
  # Catches dependency resolution failures that only surface after npm prune (#149)
  # Runs on native runners per-platform to validate native addon compilation
  docker-smoke-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build Docker image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          load: true
          tags: pr-smoke-test:latest
          cache-from: type=gha,scope=pr-smoke-${{ matrix.platform }}
          cache-to: type=gha,scope=pr-smoke-${{ matrix.platform }},mode=max

      - name: Smoke test — HTTP transport starts
        run: |
          docker run --rm -d --name pr-smoke -p 3000:3000 pr-smoke-test:latest \
            --transport http --port 3000 --server-host 0.0.0.0 --no-auth-enforcement --sqlite /tmp/test.db
          sleep 5
          if ! docker ps --filter name=pr-smoke --format '{{.Status}}' | grep -q "Up"; then
            echo "❌ Docker smoke test failed — container crashed (${{ matrix.platform }})"
            docker logs pr-smoke 2>&1 || true
            exit 1
          fi
          HTTP_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3000/health || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health endpoint returned $HTTP_STATUS (${{ matrix.platform }})"
            docker logs pr-smoke 2>&1 || true
            docker stop pr-smoke || true
            exit 1
          fi
          docker stop pr-smoke
          echo "✅ HTTP smoke test passed (${{ matrix.platform }})"

      - name: Smoke test — native SQLite backend starts
        run: |
          # Verify better-sqlite3 native bindings load correctly
          docker run --rm -d --name pr-smoke-native -p 3001:3000 pr-smoke-test:latest \
            --transport http --port 3000 --server-host 0.0.0.0 --no-auth-enforcement --sqlite-native /tmp/test.db
          sleep 5
          if ! docker ps --filter name=pr-smoke-native --format '{{.Status}}' | grep -q "Up"; then
            echo "❌ Native SQLite smoke test failed (${{ matrix.platform }})"
            docker logs pr-smoke-native 2>&1 || true
            exit 1
          fi
          HTTP_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:3001/health || echo "000")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Health endpoint returned $HTTP_STATUS (${{ matrix.platform }})"
            docker logs pr-smoke-native 2>&1 || true
            docker stop pr-smoke-native || true
            exit 1
          fi
          docker stop pr-smoke-native
          echo "✅ Native SQLite smoke test passed (${{ matrix.platform }})"
