name: Publish to NPM

# npm publish is gated behind Docker security checks:
# - Triggered by docker-publish.yml after Docker Scout + image push succeeds
# - No manual dispatch — all publishes must pass gatekeeper pipeline
#
# OIDC Trusted Publishing:
# This workflow uses npm's OIDC-based trusted publishing (provenance).
# The NPM_TOKEN is still accepted as a fallback for environments where
# OIDC is not configured. To enable OIDC:
#   1. Link this GitHub repo in npm package settings → "Configure Trusted Publishing"
#   2. Remove the NPM_TOKEN secret once OIDC is verified working
on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/db-mcp

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check version consistency
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          LOCK_VERSION=$(node -p "require('./package-lock.json').version")
          if [ "$PKG_VERSION" != "$LOCK_VERSION" ]; then
            echo "::error::Version mismatch between package.json ($PKG_VERSION) and package-lock.json ($LOCK_VERSION)"
            exit 1
          fi

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if version already published
        id: check
        run: |
          PKG_VERSION="${{ steps.version.outputs.version }}"
          PUBLISHED=$(npm view db-mcp version 2>/dev/null || echo "none")
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "Version $PKG_VERSION already published, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Publishing version $PKG_VERSION (current published: $PUBLISHED)"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        if: steps.check.outputs.skip != 'true'
        run: npm run build

      - name: Publish to NPM
        if: steps.check.outputs.skip != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "Waiting for npm registry propagation..."
          for i in 1 2 3; do
            sleep 30
            echo "Attempt $i: Checking npm registry..."
            PUBLISHED=$(npm view db-mcp version 2>/dev/null || echo "none")
            EXPECTED="${{ steps.version.outputs.version }}"
            if [ "$PUBLISHED" = "$EXPECTED" ]; then
              echo "✅ Published: $PUBLISHED | Expected: $EXPECTED"
              exit 0
            fi
            echo "Package not yet visible, retrying..."
          done
          echo "⚠️ Package may still be propagating to npm registry. This is informational only."
