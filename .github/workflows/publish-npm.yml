name: Publish to NPM

# pnpm publish is gated behind Docker security checks:
# - Triggered by docker-publish.yml after Docker Scout + image push succeeds
# - No manual dispatch — all publishes must pass gatekeeper pipeline
#
# OIDC Trusted Publishing:
# This workflow uses npm's OIDC-based trusted publishing (provenance).
# The NPM_TOKEN is still accepted as a fallback for environments where
# OIDC is not configured. To enable OIDC:
#   1. Link this GitHub repo in npm package settings → "Configure Trusted Publishing"
#   2. Remove the NPM_TOKEN secret once OIDC is verified working
on:
  workflow_call:
    secrets:
      NPM_TOKEN:
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    environment:
      name: npm
      url: https://www.npmjs.com/package/db-mcp

    steps:
      - name: Verify NPM Authentication
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::warning::NPM_TOKEN is missing. This workflow relies on OIDC Trusted Publishing. If OIDC is not configured in npm, the publish step will fail."
          fi

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Check if version already published
        id: check
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          PUBLISHED=$(pnpm view db-mcp version 2>/dev/null || echo "none")
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          if [ "$PUBLISHED" = "$PKG_VERSION" ]; then
            echo "Version $PKG_VERSION already published, skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Publishing version $PKG_VERSION (current published: $PUBLISHED)"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        if: steps.check.outputs.skip != 'true'
        run: pnpm run build

      - name: Publish to NPM
        if: steps.check.outputs.skip != 'true'
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publication
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "Waiting for npm registry propagation..."
          for i in 1 2 3; do
            sleep 30
            echo "Attempt $i: Checking npm registry..."
            PUBLISHED=$(pnpm view db-mcp version 2>/dev/null || echo "none")
            EXPECTED="${{ steps.version.outputs.version }}"
            if [ "$PUBLISHED" = "$EXPECTED" ]; then
              echo "✅ Published: $PUBLISHED | Expected: $EXPECTED"
              exit 0
            fi
            echo "Package not yet visible, retrying..."
          done
          echo "⚠️ Package may still be propagating to npm registry. This is informational only."
