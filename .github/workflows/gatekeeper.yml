name: CI/CD Pipeline

permissions:
  contents: read

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  lint:
    uses: ./.github/workflows/lint-and-test.yml
    permissions:
      contents: read

  codeql:
    uses: ./.github/workflows/codeql.yml
    permissions:
      actions: read
      contents: read
      security-events: write

  secrets:
    uses: ./.github/workflows/secrets-scanning.yml
    permissions:
      contents: read

  # L-5: PR security coverage is handled by independent workflow triggers
  # (lint-and-test.yml, codeql.yml, secrets-scanning.yml). The gatekeeper
  # orchestrates the publish gate on push/tag events only.
  trivy:
    uses: ./.github/workflows/security-update.yml
    permissions:
      contents: read # C-20: trimmed from write — workflow only reads source
      issues: write
      security-events: write

  publish:
    needs: [lint, codeql, secrets, trivy]
    # Publish only on tag pushes (v*) after ALL security gates pass.
    # Main-branch pushes (squash merge) run checks only — the tag push triggers the actual publish.
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.lint.result == 'success' &&
      needs.codeql.result == 'success' &&
      needs.secrets.result == 'success' &&
      needs.trivy.result == 'success'
    uses: ./.github/workflows/docker-publish.yml
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
      attestations: write
    secrets:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
