name: Security Update Check

on:
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read # C-20: trimmed from write — workflow only reads source

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    outputs:
      scan-failed: ${{ steps.check-scan.outputs.failed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v3

      - name: Build image for scanning
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v6
        with:
          context: .
          file: Dockerfile
          tags: security-test:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Run SARIF scan first (non-blocking) to always generate the file
      - name: Run Trivy scanner for SARIF output
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c7d8aeef2c4a27e6e7d1fd3e # v0.30.0
        with:
          image-ref: security-test:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH,MEDIUM'
          trivyignores: '.trivyignore'
          skip-dirs: '/usr/local/lib/node_modules/npm'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'

      # Run table scan (blocking) after SARIF is uploaded
      - name: Run Trivy vulnerability scanner
        id: trivy-scan
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c7d8aeef2c4a27e6e7d1fd3e # v0.30.0
        with:
          image-ref: security-test:latest
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH,MEDIUM'
          trivyignores: '.trivyignore'
          skip-dirs: '/usr/local/lib/node_modules/npm'

      - name: Check scan result
        id: check-scan
        if: always()
        run: |
          if [ "${{ steps.trivy-scan.outcome }}" = "failure" ]; then
            echo "failed=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi

  # Separate job for issue creation — scoped with issues: write
  create-issue:
    needs: [security-scan]
    if: ${{ always() && needs.security-scan.outputs.scan-failed == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create security issue if vulnerabilities found
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v7
        env:
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SCHEDULE: ${{ github.event.schedule || 'Manual trigger' }}
        with:
          script: |
            const title = '🚨 Security vulnerabilities detected in Docker images'

            // Check for existing open issue with same title to avoid duplicates
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,vulnerability,docker',
              per_page: 10,
            })
            if (existing.some(issue => issue.title === title)) {
              console.log('Open security issue already exists — skipping creation')
              return
            }

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `
              ## Security Alert

              Trivy has detected security vulnerabilities in our Docker images.

              **Action Required:**
              1. Review the security scan results in the Actions tab
              2. Update base images and dependencies
              3. Test the fixes
              4. Deploy updated images

              **Scan Details:**
              - Workflow run: ${process.env.SERVER_URL}/${process.env.REPOSITORY}/actions/runs/${process.env.RUN_ID}
              - Triggered by: Weekly security scan
              - Scan Date: ${process.env.SCHEDULE}

              **Next Steps:**
              - [ ] Review vulnerability details
              - [ ] Update Dockerfiles
              - [ ] Test changes
              - [ ] Deploy fixes
              `,
              labels: ['security', 'vulnerability', 'docker']
            })
